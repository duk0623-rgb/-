<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>제민 비전 트레이닝 - 우주 워프</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="warpCanvas"></canvas>
<script>
const canvas = document.getElementById('warpCanvas');
const ctx = canvas.getContext('2d');

let width, height, centerX, centerY;
let stars = [];
const numStars = 1000; // 별의 개수 (성능에 따라 조절 가능)
let speed = 5; // 워프 속도

// 별 객체 정의
function Star() {
    this.x = Math.random() * width - centerX; // x 위치 (중심 기준)
    this.y = Math.random() * height - centerY; // y 위치 (중심 기준)
    this.z = Math.random() * width; // 깊이 (처음엔 멀리 배치)
    this.pz = this.z; // 이전 깊이 (선을 그리기 위함)
}

// 별 업데이트 및 그리기
Star.prototype.update = function() {
    this.z = this.z - speed; // z축으로 이동 (앞으로 다가옴)
    
    // 별이 화면 앞으로 지나가면 뒤로 재배치
    if (this.z < 1) {
        this.z = width;
        this.x = Math.random() * width - centerX;
        this.y = Math.random() * height - centerY;
        this.pz = this.z;
    }
};

Star.prototype.show = function() {
    // 3D 투영 (Perspectiv Projection) 핵심!
    // z값이 작아질수록 (가까워질수록) x, y 좌표가 화면 외곽으로 멀어짐
    const sx = (this.x / this.z) * centerX + centerX;
    const sy = (this.y / this.z) * centerY + centerY;
    
    // 별의 크기도 가까워질수록 커짐
    const r = (1 - this.z / width) * 2.5;

    // 이전 위치 (p-값)
    const px = (this.x / this.pz) * centerX + centerX;
    const py = (this.y / this.pz) * centerY + centerY;

    this.pz = this.z;

    // 별 그리기 (속도감을 위해 선으로 표현)
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(sx, sy);
    ctx.lineWidth = r;
    ctx.strokeStyle = `rgba(255, 255, 255, ${1 - this.z / width})`; // 가까울수록 선명하게
    ctx.stroke();
};

// 화면 크기 조정
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    centerX = width / 2;
    centerY = height / 2;
}

// 초기화 및 애니메이션 루프
function init() {
    resize();
    for (let i = 0; i < numStars; i++) {
        stars[i] = new Star();
    }
}

function animate() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // 잔상 효과
    ctx.fillRect(0, 0, width, height);
    
    for (let i = 0; i < numStars; i++) {
        stars[i].update();
        stars[i].show();
    }
    requestAnimationFrame(animate);
}

// 이벤트 리스너
window.addEventListener('resize', resize);
// 속도 조절 (마우스 휠이나 터치)
window.addEventListener('wheel', (e) => {
    speed += e.deltaY * -0.01;
    speed = Math.max(1, Math.min(speed, 50)); // 최소/최대 속도 제한
});

init();
animate();

</script>
</body>
</html>
