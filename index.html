<!DOCTYPE html>
<html>
<head><style>body { margin: 0; overflow: hidden; background: black; }</style></head>
<body>
<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 별들을 관리할 배열
    const stars = [];
    for(let i=0; i<3000; i++) {
        const star = new THREE.Mesh(
            new THREE.CircleGeometry(0.1, 8), 
            new THREE.MeshBasicMaterial({color: 0xffffff})
        );
        // 별들의 초기 위치를 더 넓게 배치 (공간감 확보)
        star.position.set((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
        scene.add(star);
        stars.push(star);
    }

    camera.position.z = 20;

    function animate() {
        requestAnimationFrame(animate);
        stars.forEach(s => {
            s.position.z += 1.0; // 속도
            // 카메라 뒤로 지나간 별을 다시 뒤쪽으로 재배치
            if(s.position.z > 20) s.position.z = -200;
            
            // 핵심: 원근감 효과 (거리에 따라 크기 조절)
            let scale = Math.max(0.1, (20 - s.position.z) / 40);
            s.scale.set(scale, scale, scale);
        });
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
