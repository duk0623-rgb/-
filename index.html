<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
    <a-scene>
        <a-sky color="#000000"></a-sky>
        <a-entity id="star-container"></a-entity>
        <a-camera position="0 0 0"></a-camera>
    </a-scene>

    <script>
        const container = document.querySelector('#star-container');
        for (let i = 0; i < 500; i++) {
            const star = document.createElement('a-sphere');
            star.setAttribute('radius', '0.1');
            star.setAttribute('color', '#FFF');
            
            // 별을 사방에 배치
            const x = (Math.random() - 0.5) * 100;
            const y = (Math.random() - 0.5) * 100;
            const z = (Math.random() - 0.5) * 100;
            star.setAttribute('position', `${x} ${y} ${z}`);
            
            // [핵심] 별이 카메라(0,0,0)를 향해 돌진하는 애니메이션!
            star.setAttribute('animation', {
                property: 'position',
                from: `${x} ${y} ${z}`,
                to: `${x * 0.01} ${y * 0.01} ${z * 0.01}`, // 중심으로 모임
                dur: 3000 + Math.random() * 2000,         // 속도 랜덤
                loop: true,                               // 반복
                easing: 'linear'
            });
            container.appendChild(star);
        }
    </script>
</body>
</html>
